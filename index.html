<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的作品集</title>
        <style>
            :root {
                --primary-color: #007BFF;
                --secondary-color: #6C757D;
                --light-bg: #F8F9FA;
                --card-bg: #FFFFFF;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
                --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: var(--light-bg);
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                color: #444;
                line-height: 1.6;
                padding: 20px;
                min-height: 100vh;
            }

            .container {
                max-width: 2000px;
                height: 80%;
                margin: 0 auto;
            }

            .portfolio-container {
                display: flex;
                gap: 20px;
            }

            .sidebar {
                width: 250px;
                background-color: var(--card-bg);
                border-radius: 10px;
                padding: 20px;
                box-shadow: var(--shadow-sm);
                height: 91vh;
                overflow-y: auto;
            }

            .sidebar h2 {
                font-size: 1.2em;
                color: #333;
                margin-bottom: 15px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }

            .project-list {
                list-style: none;
            }

            .project-list li {
                padding: 10px 0;
                border-bottom: 1px solid #f5f5f5;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .project-list li:hover {
                color: var(--primary-color);
                padding-left: 5px;
            }

            .project-list li.active {
                color: var(--primary-color);
                font-weight: 500;
                border-left: 3px solid var(--primary-color);
                padding-left: 12px;
            }

            .preview-area {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .preview-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 20px;
                background-color: var(--card-bg);
                border-radius: 10px 10px 0 0;
                box-shadow: var(--shadow-sm);
            }

            .preview-title {
                font-size: 1.3em;
                color: #333;
            }

            .preview-frame {
                flex: 1;
                border: none;
                border-radius: 0 0 10px 10px;
                box-shadow: var(--shadow-sm);
                background-color: #fff;
            }

            .footer {
                text-align: center;
                padding: 0 0;
                color: #888;
                border-top: 1px solid #eee;
            }

            @media (max-width: 768px) {
                .portfolio-container {
                    flex-direction: column;
                    height: 100vh;
                }

                .sidebar {
                    width: 100%;
                    height: 20vh;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="portfolio-container">
                <div class="sidebar">
                    <h2>作品列表</h2>
                    <ul class="project-list">
                        <li class="active" data-src="titanic_analysis.html">泰坦尼克沉船事件的归因分析与幸存预测</li>
<!--                        <li data-src="MyTest.html">数据可视化项目</li>-->
                    </ul>
                </div>

                <div class="preview-area">
                    <div class="preview-header">
                        <div class="preview-title">泰坦尼克沉船事件的归因分析与幸存预测</div>
                    </div>
                    <iframe class="preview-frame" src="titanic_analysis.html" frameborder="0"></iframe>
                </div>
            </div>

            <div class="footer">
                <p>© 2026 我的《数据分析》作品集</p >
            </div>
        </div>

        <script>
            const projectItems = document.querySelectorAll('.project-list li');
            const previewFrame = document.querySelector('.preview-frame');
            const previewTitle = document.querySelector('.preview-title');

            projectItems.forEach(item => {
                item.addEventListener('click', function() {
                    projectItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    previewFrame.src = this.getAttribute('data-src');
                    previewTitle.textContent = this.textContent;
                });
            });
        </script>
    </body>
</html>
